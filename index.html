<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronicles of Aryavarta</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-shell">
    <canvas id="world"></canvas>

    <div id="hud">
      <div id="stats"></div>
      <div id="inventory"></div>
      <div id="log"></div>
      <div id="touch-controls" aria-label="Touch controls">
        <div class="dpad">
          <button id="btn-up" type="button" aria-label="Move up">↑</button>
          <div class="dpad-row">
            <button id="btn-left" type="button" aria-label="Move left">←</button>
            <button id="btn-down" type="button" aria-label="Move down">↓</button>
            <button id="btn-right" type="button" aria-label="Move right">→</button>
          </div>
        </div>
        <button id="btn-act" type="button" class="action" aria-label="Interact">act</button>
      </div>
    </div>

    <div id="dialogue"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
